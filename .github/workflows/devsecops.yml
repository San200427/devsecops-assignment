name: Complete DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  # 1. SAST - CodeQL
  sast-codeql:
    name: CodeQL SAST Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: javascript

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3

  # 2. Container Security - Trivy
  container-security:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build the Docker image
      run: docker build -t my-app-image:latest .

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'my-app-image:latest'
        format: 'table'
        exit-code: '0' # Keeps the pipeline green
        ignore-unfixed: true
        vuln-type: 'os,library'

  # 3. DAST - OWASP ZAP
  dast-zap:
    name: OWASP ZAP DAST Scan
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build and Run App for DAST
      run: |
        docker build -t my-app-image:latest .
        docker run -d -p 8080:8080 my-app-image:latest
        sleep 15 # Wait for the app to start

    - name: ZAP Baseline Scan
      uses: zaproxy/action-baseline@v0.12.0
      with:
        target: 'http://localhost:8080'
        fail_action: false # Keeps the pipeline green
